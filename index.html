<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho: Agricultura Forte</title>
    <style>
        /* Estilos Gerais e Cores do Agro */
        :root {
            --verde-escuro: #1b4d3e;
            --verde-claro: #2c7a5f;
            --laranja-terra: #f4a261;
            --bege-claro: #f4f1de;
            --texto-escuro: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Efeito de rolagem suave para os links funcionarem bem */
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 70px; /* Evita que o menu fixo cubra o título da seção */
        }

        body {
            background-color: var(--bege-claro);
            color: var(--texto-escuro);
            line-height: 1.6;
        }

        /* Menu de Navegação */
        header {
            background-color: var(--verde-escuro);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: var(--laranja-terra);
        }

        /* Seções Principal / Hero */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=1200') no-repeat center center/cover;
